[workspace]
members = [
    "services/admin-service",
    "services/user-service",
    "services/order-service",
    "services/matching-engine",
    "services/feed-service",
    "services/auth-service",
    "services/market-service",
    "services/settlement-service",
    "common"
]

resolver = "2"

[workspace.dependencies]
argon2 = "0.5.1"
async-trait = "0.1.72"
axum = { version = "0.7.6", features = ["multipart"] }
axum-extra = { version = "0.9.3", features = ["cookie"] }
chrono = { version = "0.4.26", features = ["serde"] }
dotenv = "0.15.0"
jsonwebtoken = "9.2.0"
rust_decimal = { version = "1", features = ["db-postgres", "serde-with-str"] }
rust_decimal_macros = "1"
serde = { version = "1.0.183", features = ["derive"] }
serde_json = "1.0.104"
sqlx = { version = "0.8.1", features = ["runtime-async-std-native-tls", "postgres", "chrono", "uuid","rust_decimal" ] }
tokio = { version = "1.39.3", features = ["full"] }
uuid = { version = "1.4.1", features = ["serde", "v4"] }
validator = { version = "0.20.0", features = ["derive"] }
tower-http = { version = "0.5.2", features = ["cors", "trace"] }
tracing-subscriber = { version = "0.3.18" }
time = "0.3.20"
async-nats = "0.35"
futures = "0.3"
redis = { version = "0.32", features = ["tokio-comp"] }
deadpool-redis = "0.22"